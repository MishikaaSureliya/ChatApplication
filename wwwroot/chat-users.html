<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Users</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    .user-item { display:block; padding:8px; border-bottom:1px solid #ddd; }
  </style>
</head>

<body>
    <script src="js/config.js"></script>
    <h1>Users</h1>
    <div id="usersList"></div>
    <script src="/js/chat-users.js"></script>
    <div id="incomingCallPopup" class="hidden incoming-call">
        <div class="call-box">
            <h3 id="callerName">Incoming Call...</h3>

            <div class="call-actions">
                <button id="acceptCallBtn" class="accept">Accept</button>
                <button id="rejectCallBtn" class="reject">Reject</button>
            </div>
        </div>
    </div>

</body>
</html>
