<!DOCTYPE html>

<html>
<head>
    <meta charset="utf-8" />
    <title data-i18n="LoginTitle">Login - MishRooms</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body class="bg">
    <script src="js/config.js"></script>

    <div class="login-container">
        <div class="login-box">
            <h2 data-i18n="Welcome">MishRooms</h2>
            <p class="subtitle" data-i18n="LoginTitle">Login to continue</p>



            <input type="text" id="username" data-i18n="Username" placeholder="Username" />
            <input type="password" id="password" data-i18n="Password" placeholder="Password" />


            <button id="loginBtn" onclick="login()" data-i18n="Login">Login</button>


            <p class="link">
                <span data-i18n="DontHaveAccount?">Don't have an account?</span>
                <a href="register.html" data-i18n="Register">Register</a>
            </p>

        </div>

    </div>
    <div class="lang-switcher">
        <button class="lang-btn" id="langBtn" title="Change Language">
            <i class="fas fa-globe"></i>
        </button>
        <div class="lang-dropdown" id="langDropdown">
            <div class="lang-option" onclick="setLanguage('en')" id="lang-en">
                English
            </div>
            <div class="lang-option" onclick="setLanguage('de')" id="lang-de">
                Deutsch
            </div>
        </div>
    </div>

    </div>

    <script src="js/localization.js"></script>
    <script src="js/app.js"></script>



</body>
</html>
