<!DOCTYPE html>

<html>
<head>
    <meta charset="utf-8" />
    <title data-i18n="Register">Register</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body class="bg">
    <script src="js/config.js"></script>
    <div class="login-box">
        <h2 data-i18n="Register">Create Account</h2>


        <input type="text" id="regUsername" data-i18n="Username" placeholder="Username" />
        <input type="email" id="regEmail" data-i18n="Email" placeholder="Email" />
        <input type="password" id="regPassword" data-i18n="Password" placeholder="Password" />
        <input type="password" id="confirmPassword" data-i18n="ConfirmPassword" placeholder="Confirm Password" />


        <p id="errorMsg" style="color:red;"></p>

        <button onclick="register()" data-i18n="Register">Register</button>


        <p class="link">
            <span data-i18n="AlreadyHaveAccount?">Already have an account?</span>
            <a href="index.html" data-i18n="Login">Login</a>
        </p>

    </div>
    <div class="lang-switcher">
        <button class="lang-btn" id="langBtn" title="Change Language">
            <i class="fas fa-globe"></i>
        </button>
        <div class="lang-dropdown" id="langDropdown">
            <div class="lang-option" onclick="setLanguage('en')" id="lang-en">English</div>
            <div class="lang-option" onclick="setLanguage('de')" id="lang-de">Deutsch</div>
        </div>
    </div>

    </div>

    <script src="js/localization.js"></script>
    <script src="js/register.js"></script>



</body>
</html>
